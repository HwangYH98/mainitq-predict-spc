name: MaintiQ Predict CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall -q src app desktop_app tools streamlit_app.py

      - name: Unit tests
        run: python -m pytest -q

      - name: GitHub upload scope check
        run: python tools/check_github_upload_scope.py
